name: LTW26 Poll Every Minute

on:
  schedule:
    - cron: "1 1 1 1 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ltw26-minute-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run LTW26 poller
        run: |
          python scripts/poll_ltw26.py

      - name: Commit and push updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git pull --rebase
          git add README.md data/ltw26 config/ltw26_config.json scripts/poll_ltw26.py
          git commit -m "LTW26 poll $(date -u +"%Y-%m-%dT%H:%M:%SZ")" || echo "No changes to commit"
          git push
