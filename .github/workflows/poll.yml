name: Election Poll

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 2026-bw-minute-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run election poller with retry
        run: |
          attempt=1
          max_attempts=3
          sleep_seconds=30

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Starting poll attempt $attempt/$max_attempts"
            if python scripts/poll_election.py --election-key 2026-bw; then
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Poll failed after $max_attempts attempts"
              exit 1
            fi

            echo "Poll attempt $attempt failed, waiting ${sleep_seconds}s before retry"
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

      - name: Snapshot generated outputs
        run: |
          mkdir -p /tmp/poll-output/data/2026-bw/metadata
          mkdir -p /tmp/poll-output/data/2026-bw/reports
          cp -R data/2026-bw/latest /tmp/poll-output/data/2026-bw/
          cp data/2026-bw/metadata/municipalities.csv /tmp/poll-output/data/2026-bw/metadata/
          cp data/2026-bw/metadata/wahlkreis-status.csv /tmp/poll-output/data/2026-bw/metadata/
          cp data/2026-bw/reports/latest_events.csv /tmp/poll-output/data/2026-bw/reports/
          cp data/2026-bw/reports/latest_source_diff.csv /tmp/poll-output/data/2026-bw/reports/

      - name: Commit and push updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git fetch origin main
          git checkout -B main origin/main
          rm -rf data/2026-bw/latest
          mkdir -p data/2026-bw/metadata
          mkdir -p data/2026-bw/reports
          cp -R /tmp/poll-output/data/2026-bw/latest data/2026-bw/
          cp /tmp/poll-output/data/2026-bw/metadata/municipalities.csv data/2026-bw/metadata/
          cp /tmp/poll-output/data/2026-bw/metadata/wahlkreis-status.csv data/2026-bw/metadata/
          cp /tmp/poll-output/data/2026-bw/reports/latest_events.csv data/2026-bw/reports/
          cp /tmp/poll-output/data/2026-bw/reports/latest_source_diff.csv data/2026-bw/reports/
          git add data/2026-bw/latest
          git add data/2026-bw/metadata/municipalities.csv
          git add data/2026-bw/metadata/wahlkreis-status.csv
          git add data/2026-bw/reports/latest_events.csv
          git add data/2026-bw/reports/latest_source_diff.csv
          git diff --cached --quiet && exit 0
          git commit -m "2026-bw poll $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          git push origin HEAD:main
